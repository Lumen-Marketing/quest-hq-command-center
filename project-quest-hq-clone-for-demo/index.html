<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070706">
<title>Quest HQ · Operations Command · Workspaces</title>
<link rel="icon" href="images/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
/* ==================================================================
   Quest HQ Operations Command — warm amber design tokens
   (reconstructed to match quest-hq-command-center-gamma.vercel.app)
   ================================================================== */
:root{
  --bg:#efe8d9; --surface:#fffaf0; --surface-2:#f6efe4; --surface-3:#fbf6ec;
  --rail:#070706; --rail-2:#141311; --rail-line:rgba(255,244,218,.12);
  --border:#e2d5bf; --border-strong:#d3c1a7;
  --text:#17130f; --text-2:#473f34; --text-muted:#72695d;
  --amber:#f4b234; --amber-2:#f8d995; --amber-soft:#fff1d2;
  --orange:#e66a1f;
  --primary:#e66a1f; --primary-hover:#cf5a16; --primary-soft:#fdecd8;
  --ring:rgba(230,106,31,.22);
  --success:#15803d; --success-soft:#dcfce7;
  --warning:#b45309; --warning-soft:#fef3c7;
  --danger:#b91c1c; --danger-soft:#fdecec;
  --info:#2563eb; --info-soft:#dbeafe;
  --purple:#7c3aed; --purple-soft:#ede9fe;
  --teal:#0d9488; --teal-soft:#ccfbf1;
  --shadow-sm:0 1px 2px rgba(33,31,27,.08);
  --shadow-md:0 14px 38px rgba(29,24,17,.12);
  --shadow-lg:0 22px 70px rgba(33,31,27,.22);
  --soft-shadow:0 14px 38px rgba(29,24,17,.06);
  --radius:14px; --radius-sm:10px;
}
[data-theme="dark"]{
  --bg:#0f1115; --surface:#181b20; --surface-2:#20242b; --surface-3:#2a2f37;
  --border:#2f343c; --border-strong:#3a4049;
  --text:#f3eee4; --text-2:#cabfaf; --text-muted:#9ca3af;
  --amber:#f6c259; --amber-soft:#3a2c12;
  --orange:#f1843f;
  --primary:#f1843f; --primary-hover:#f59a5e; --primary-soft:#3a2414;
  --ring:rgba(241,132,63,.28);
  --success:#34d399; --success-soft:#10362a;
  --warning:#fbbf24; --warning-soft:#3a2c0a;
  --danger:#f87171; --danger-soft:#3a1414;
  --info:#60a5fa; --info-soft:#16243d;
  --purple:#a78bfa; --purple-soft:#241a3d;
  --teal:#2dd4bf; --teal-soft:#0c3631;
  --soft-shadow:0 14px 38px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;background:var(--bg)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;border:2px solid var(--surface)}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
.mono{font-family:'JetBrains Mono',monospace}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-weight:700;font-size:.86rem;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface-2)}
.btn .material-symbols-outlined,.btn i{font-size:18px}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 8px 20px rgba(230,106,31,.28)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:6px 11px;font-size:.82rem}
.btn-danger{color:var(--danger);border-color:var(--border-strong)}
.btn-danger:hover{background:var(--danger-soft);border-color:var(--danger)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ==================================================================
   APP SHELL — quest-app grid (deck + topbar + work surface)
   ================================================================== */
.quest-app{display:grid;grid-template-columns:212px minmax(0,1fr);grid-template-rows:auto minmax(0,1fr);min-height:100vh;
  background:radial-gradient(circle at 84% 6%,rgba(244,178,52,.18),transparent 28%),linear-gradient(135deg,#f7f0e2,#efe6d6);padding:18px 20px}
[data-theme="dark"] .quest-app{background:radial-gradient(circle at 84% 6%,rgba(244,178,52,.12),transparent 28%),var(--bg)}

/* ---- DECK (dark sidebar) ---- */
.deck{grid-column:1;grid-row:1 / span 2;display:flex;flex-direction:column;min-height:calc(100vh - 36px);min-width:0;
  border:1px solid rgba(255,244,218,.08);border-right:0;border-radius:14px 0 0 14px;
  background:radial-gradient(circle at 50% 0%,rgba(244,178,52,.18),transparent 24%),linear-gradient(180deg,#0b0b0a,#070706);
  box-shadow:18px 0 50px rgba(18,16,12,.12);padding:18px 13px;overflow:auto}
.deck-brand{display:grid;grid-template-columns:44px minmax(0,1fr);align-items:center;gap:11px;margin-bottom:18px;color:#fff8e8}
.deck-brand .logo{width:44px;height:44px;border-radius:12px;border:1px solid rgba(244,178,52,.72);
  background:linear-gradient(145deg,#2a2113,#090807);box-shadow:inset 0 -6px rgba(244,178,52,.2),0 12px 30px rgba(0,0,0,.28);
  display:grid;place-items:center;color:var(--amber);font-weight:900;font-size:1.25rem}
.deck-brand strong{display:block;font-size:13.5px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-brand small{display:block;margin-top:3px;color:#e9d7ae;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.company-card{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:center;border:1px solid var(--rail-line);border-radius:9px;background:rgba(255,250,240,.06);padding:11px;margin-bottom:16px;color:#fff8e8;cursor:pointer;transition:.15s}
.company-card:hover{background:rgba(255,250,240,.1)}
.company-card .csym{display:grid;place-items:center;width:40px;height:40px;border-radius:8px;border:1px solid rgba(244,178,52,.5);background:rgba(244,178,52,.16);color:var(--amber);box-shadow:inset 4px 0 var(--amber);overflow:hidden}
.company-card .csym img{width:100%;height:100%;object-fit:cover}
.company-card strong{display:block;font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.company-card small{display:block;color:#bdb29f;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.company-card .material-symbols-outlined{color:#bdb29f;font-size:18px}

.nav-groups{flex:1;min-height:0}
.side-group{margin-bottom:15px}
.side-label{display:flex;align-items:center;color:rgba(255,248,232,.6);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;margin-bottom:4px}
.side-label .add-mini{margin-left:auto;cursor:pointer;width:20px;height:20px;display:grid;place-items:center;border-radius:6px;color:rgba(255,248,232,.7);font-size:17px}
.side-label .add-mini:hover{background:rgba(255,255,255,.12);color:var(--amber)}
.side-items{display:grid;gap:4px}
.side-item{display:grid;grid-template-columns:24px minmax(0,1fr) auto;align-items:center;gap:9px;min-height:38px;border-radius:8px;color:rgba(255,248,232,.82);
  padding:0 10px;font-size:13px;font-weight:800;border:none;background:none;cursor:pointer;text-align:left;width:100%;transition:.13s}
.side-item i,.side-item .material-symbols-outlined{justify-self:center;font-size:19px;color:rgba(255,248,232,.72)}
.side-item .wsdot{width:21px;height:21px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:13px;justify-self:center}
.side-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-item b{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;border-radius:999px;background:var(--amber);color:#090807;padding:0 7px;font-size:11px;font-weight:900}
.side-item:hover,.side-item.active{background:rgba(255,255,255,.1);color:#fffaf0;box-shadow:inset 3px 0 var(--amber)}
.side-item:hover i,.side-item.active i,.side-item.active .material-symbols-outlined{color:#fffaf0}
.side-item.planned{color:rgba(255,248,232,.42);cursor:default}
.side-item.planned b{background:rgba(255,248,232,.16);color:rgba(255,248,232,.7);font-size:9px;text-transform:uppercase;letter-spacing:.05em}
.side-item.planned:hover{background:none;box-shadow:none;color:rgba(255,248,232,.42)}
.deck-empty{padding:6px 11px;font-size:12px;color:rgba(255,248,232,.45)}
.deck-footer{display:grid;gap:9px;margin-top:auto;padding-top:16px}
.deck-user-card{display:grid;grid-template-columns:32px minmax(0,1fr) auto;align-items:center;gap:9px;width:100%;min-height:50px;border:1px solid var(--rail-line);border-radius:9px;background:rgba(255,250,240,.05);color:#fff8e8;padding:8px;text-align:left;cursor:pointer;transition:.15s}
.deck-user-card:hover{background:rgba(255,250,240,.1)}
.deck-user-card .avatar{width:32px;height:32px}
.deck-user-card strong{display:block;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-user-card small{display:block;color:#bdb29f;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-user-card .material-symbols-outlined{color:#bdb29f;font-size:19px}

/* ---- TOPBAR ---- */
.topbar{grid-column:2;grid-row:1;display:flex;align-items:center;gap:16px;min-width:0;min-height:74px;
  border:1px solid var(--border);border-left:0;border-bottom:0;border-radius:0 14px 0 0;background:color-mix(in srgb,var(--surface) 90%,transparent);
  box-shadow:0 -10px 40px rgba(33,31,27,.05);padding:12px 22px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.menu-btn{display:none;border:none;background:none;cursor:pointer;color:var(--text)}
.tb-title{min-width:0}
.tb-title h1{font-size:1.18rem;font-weight:900;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;line-height:1.1}
.tb-title .crumbs{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-muted);font-weight:700;margin-top:2px}
.tb-title .crumbs .sep{font-size:14px}
.tb-title .crumb-link{cursor:pointer}
.tb-title .crumb-link:hover{color:var(--primary)}
.tb-spacer{flex:1}
.global-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border-strong);border-radius:10px;background:var(--surface);padding:8px 12px;width:240px;color:var(--text-muted)}
.global-search input{border:none;background:none;outline:none;font-family:inherit;font-size:.86rem;color:var(--text);width:100%}
.global-search .material-symbols-outlined{font-size:19px}
.tb-icon{position:relative;width:40px;height:40px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--text-2)}
.tb-icon:hover{background:var(--surface-2)}
.tb-icon .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--orange);border:2px solid var(--surface)}
.account-menu{display:flex;align-items:center;gap:9px;border:1px solid var(--border-strong);border-radius:10px;background:var(--surface);padding:5px 10px 5px 5px;cursor:pointer}
.account-menu:hover{background:var(--surface-2)}
.account-menu .who{font-size:.8rem;font-weight:800;line-height:1.15}
.account-menu .role{font-size:.7rem;color:var(--text-muted)}

/* ---- WORK SURFACE ---- */
.work-surface{grid-column:2;grid-row:2;min-width:0;overflow:auto;border:1px solid var(--border);border-left:0;border-top:0;border-radius:0 0 14px 0;
  background:var(--surface);box-shadow:var(--soft-shadow)}
.content{padding:26px 28px;max-width:1280px;width:100%;margin:0 auto}

/* ---- generic page bits ---- */
.page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:1.5rem;font-weight:900;letter-spacing:-.01em;display:flex;align-items:center;gap:12px}
.page-sub{color:var(--text-muted);font-size:.92rem;margin-top:3px}
.page-head .spacer{flex:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.grid{display:grid;gap:16px}
.cols-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.cols-auto{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}

/* ==================================================================
   HOME DASHBOARD
   ================================================================== */
.home-hero{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.home-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em}
.home-hero .greet{color:var(--text-muted);font-size:.95rem;margin-top:4px}
.home-hero .spacer{flex:1}
.kpi-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:18px}
.kpi{padding:16px 18px;position:relative;overflow:hidden}
.kpi .ki{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:#fff;position:absolute;top:16px;right:16px}
.kpi .ki i{font-size:20px}
.kpi .kv{font-size:1.7rem;font-weight:900;letter-spacing:-.02em}
.kpi .kl{font-size:.74rem;color:var(--text-muted);font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.kpi .kd{font-size:.74rem;font-weight:800;margin-top:8px;display:flex;align-items:center;gap:4px}
.kpi .kd.up{color:var(--success)} .kpi .kd.down{color:var(--danger)}
.qa-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.qa{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;transition:.15s;text-align:left;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.qa:hover{box-shadow:var(--shadow-md);border-color:var(--primary);transform:translateY(-1px)}
.qa .qi{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;color:#fff;flex:none}
.qa .qi i{font-size:21px}
.qa b{font-size:.92rem;font-weight:800;display:block}
.qa span{font-size:.78rem;color:var(--text-muted)}
.home-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-top:20px;align-items:start}
@media(max-width:900px){.home-cols{grid-template-columns:1fr}}
.panel{padding:18px 20px}
.panel h3{font-size:1rem;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.panel h3 i{color:var(--orange);font-size:20px}
.panel h3 .more{margin-left:auto;font-size:.78rem;font-weight:700;color:var(--primary);cursor:pointer}
.sched-row{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.sched-row:last-child{border-bottom:none}
.sched-row .time{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;color:var(--text-muted);width:64px;flex:none}
.sched-row .bar{width:4px;align-self:stretch;border-radius:3px;flex:none}
.sched-row b{font-size:.88rem;font-weight:700;display:block}
.sched-row span{font-size:.78rem;color:var(--text-muted)}
.appr-row{display:flex;gap:11px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.appr-row:last-child{border-bottom:none}
.appr-row .material-symbols-outlined{color:var(--warning)}

/* ---- module placeholder ---- */
.module-stage{padding:10px 0}
.module-hero{display:flex;gap:18px;align-items:center;padding:24px;border-radius:var(--radius);border:1px solid var(--border);
  background:linear-gradient(135deg,var(--amber-soft),var(--surface));margin-bottom:22px}
.module-hero .mh{width:64px;height:64px;border-radius:16px;display:grid;place-items:center;color:#fff;flex:none;box-shadow:var(--shadow-md)}
.module-hero .mh i{font-size:32px}
.module-hero h2{font-size:1.45rem;font-weight:900}
.module-hero p{color:var(--text-muted);margin-top:4px;max-width:560px}
.module-hero .badge-soon{display:inline-flex;align-items:center;gap:5px;margin-top:9px;padding:3px 10px;border-radius:999px;background:var(--amber);color:#3a2a05;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
.feat-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.feat{padding:16px 18px}
.feat i{font-size:24px;color:var(--orange)}
.feat b{display:block;font-weight:800;margin:9px 0 4px}
.feat span{font-size:.84rem;color:var(--text-muted)}
.demo-note{display:flex;gap:10px;align-items:center;padding:13px 16px;border-radius:var(--radius);background:var(--info-soft);color:var(--info);font-size:.85rem;font-weight:600;margin-top:20px}
.demo-note .material-symbols-outlined{font-size:21px}

/* ==================================================================
   WORKSPACE MODULE COMPONENTS
   ================================================================== */
.ws-card{padding:20px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.ws-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--primary)}
.ws-card .topbar-stripe{position:absolute;inset:0 0 auto 0;height:5px}
.ws-card .ws-emoji{width:50px;height:50px;border-radius:13px;display:grid;place-items:center;color:#fff;font-size:26px;margin:6px 0 14px}
.ws-card h3{font-size:1.08rem;font-weight:800;margin-bottom:5px}
.ws-card p{color:var(--text-muted);font-size:.86rem;min-height:38px}
.ws-card .meta{display:flex;align-items:center;gap:14px;margin-top:14px;padding-top:13px;border-top:1px solid var(--border);font-size:.8rem;color:var(--text-muted);font-weight:600}
.ws-card .meta span{display:flex;align-items:center;gap:5px}
.avatars{display:flex}
.avatars .avatar{width:27px;height:27px;border:2px solid var(--surface);margin-left:-8px;font-size:.7rem}
.avatars .avatar:first-child{margin-left:0}
.new-card{border:2px dashed var(--border-strong);background:transparent;box-shadow:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:210px;color:var(--text-muted);cursor:pointer;transition:.18s}
.new-card:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.new-card .material-symbols-outlined{font-size:40px}
.app-card{padding:18px;cursor:pointer;transition:.16s;display:flex;gap:14px;align-items:flex-start}
.app-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary);transform:translateY(-1px)}
.app-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:23px;flex:none}
.app-card h4{font-size:1rem;font-weight:700}
.app-card .app-desc{color:var(--text-muted);font-size:.84rem;margin-top:3px}
.app-card .app-stat{font-size:.78rem;color:var(--text-muted);font-weight:600;margin-top:9px;display:flex;gap:6px;align-items:center}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:700}
.chip{display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 5px;border:1px solid var(--border);border-radius:999px;font-size:.83rem;font-weight:600;background:var(--surface)}
.chip .avatar{width:24px;height:24px;font-size:.66rem}
.chip .x{margin-left:2px;cursor:pointer;color:var(--text-muted);font-size:17px;display:grid;place-items:center;border-radius:50%;width:20px;height:20px}
.chip .x:hover{background:var(--danger-soft);color:var(--danger)}
.avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:.78rem;flex:none}
.builder-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:1000px){.builder-grid{grid-template-columns:1fr}}
.field-row{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);margin-bottom:9px;transition:.14s}
.field-row:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.field-row .grip{color:var(--text-muted);cursor:grab;font-size:20px}
.field-row.dragging{opacity:.4}
.field-row.drop-target{border-color:var(--primary);border-style:dashed}
.field-ic{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex:none;font-size:19px}
.field-row .fmeta{flex:1;min-width:0}
.field-row .fmeta b{font-weight:700;font-size:.92rem}
.field-row .fmeta .ftype{font-size:.76rem;color:var(--text-muted);font-weight:600}
.req-star{color:var(--danger);margin-left:4px}
.field-acts{display:flex;gap:4px}

(function fixSeed(){
  DB.workspaces.forEach(ws=>{ws.activity=ws.activity||[];ws.apps.forEach(app=>{app.automations=app.automations||[];});});
  if(!DB.__seedFixed){
    DB.workspaces.forEach(ws=>ws.apps.forEach(app=>{
      const st=app.fields.find(f=>f.type==='status');
      if(st&&st.config.options){
        const map={};st.config.options.forEach((o,i)=>map['__s'+(i+1)]=o.id);
        app.items.forEach(it=>{for(const k in it.values){if(map[it.values[k]])it.values[k]=map[it.values[k]];}});
        app.automations.forEach(au=>{
          if(au.trigger&&map[au.trigger.value])au.trigger.value=map[au.trigger.value];
          au.actions.forEach(ac=>{if(map[ac.value])ac.value=map[ac.value];});
        });
      }
    }));
    DB.__seedFixed=true;
  }
  DB.ui=DB.ui||{collapsed:{},theme:'light'};
  save();
})();

   ================================================================== */
function deckActiveId(){
  if(VIEW.page==='home')return 'home';
  if(['workspaces','workspace','app'].includes(VIEW.page))return 'workspaces';
  if(VIEW.page==='module')return VIEW.moduleId;
  return '';
}
function renderDeck(){
  const active=deckActiveId();
  let html=NAV_GROUPS.map(g=>{
    const items=g.items.map(it=>{
      if(it.soon)return `<button class="side-item planned" disabled><i class="ti ${it.icon}"></i><span>${esc(it.label)}</span><b>Soon</b></button>`;
      const cls='side-item'+(active===it.id?' active':'')+(it.accent?' accent':'');
      const badge=it.badge?`<b>${esc(it.badge)}</b>`:'<span></span>';
      return `<button class="${cls}" data-nav="${it.id}"><i class="ti ${it.icon}"></i><span>${esc(it.label)}</span>${badge}</button>`;
    }).join('');
    return `<div class="side-group"><div class="side-label">${esc(g.label)}</div><div class="side-items">${items}</div></div>`;
  }).join('');
  /* dynamic "My workspaces" group */
  const wsItems=DB.workspaces.length?DB.workspaces.map(w=>{
    const on=(['workspace','app'].includes(VIEW.page))&&VIEW.wsId===w.id?' active':'';
    return `<button class="side-item${on}" data-ws="${w.id}"><span class="wsdot material-symbols-outlined" style="background:${w.color}">${w.emoji}</span><span>${esc(w.name)}</span><b>${w.apps.length}</b></button>`;
  }).join(''):'<div class="deck-empty">No workspaces yet</div>';
  html+=`<div class="side-group"><div class="side-label">My Workspaces <span class="add-mini material-symbols-outlined" id="deckAddWs" title="New workspace">add</span></div><div class="side-items">${wsItems}</div></div>`;
  $('#navGroups').innerHTML=html;
  $$('#navGroups [data-nav]').forEach(b=>b.onclick=()=>{navTo(b.dataset.nav);closeSidebar();});
  $$('#navGroups [data-ws]').forEach(b=>b.onclick=()=>{openWorkspace(b.dataset.ws);closeSidebar();});
  const add=$('#deckAddWs');if(add)add.onclick=e=>{e.stopPropagation();openWsModal();};
}
function navTo(id){
  if(id==='home'){VIEW={page:'home'};}
  else if(id==='workspaces'){VIEW={page:'workspaces'};}
  else {VIEW={page:'module',moduleId:id};}
  render();
}

/* ==================================================================

function render(){
  renderDeck();renderTopbar();
  $('#app').dataset.section=deckActiveId();

  if(VIEW.page==='home')c.innerHTML=viewHome();

function renderTopbar(){
  const t=$('#tbTitle');
  let title='Home',crumbs='';

  else if(VIEW.page==='module'){const m=MODULE_META[VIEW.moduleId];title=m?m.title:'Module';crumbs='Quest HQ · Command Center';}

  else if(VIEW.page==='workspace'||VIEW.page==='app'){
    const w=curWs();
    crumbs=`<span class="crumb-link" data-go="workspaces">Workspaces</span>`;
    if(w){crumbs+=`<span class="material-symbols-outlined sep">chevron_right</span>`+(VIEW.page==='app'?`<span class="crumb-link" data-go="ws">${esc(w.name)}</span>`:`${esc(w.name)}`);title=w?w.name:'Workspace';}

  }
  t.innerHTML=`<h1>${esc(title)}</h1><div class="crumbs">${crumbs}</div>`;
  $$('#tbTitle [data-go]').forEach(el=>el.onclick=()=>{el.dataset.go==='home'?(VIEW={page:'home'}):el.dataset.go==='workspaces'?(VIEW={page:'workspaces'}):openWorkspace(VIEW.wsId);render();});

}

function viewApp(){

    </div>

    ${VIEW.appTab==='fields'?`<button class="btn btn-primary" data-add-field><span class="material-symbols-outlined">add</span> Add field</button>`:''}

function viewBuilder(a){

    return `<div class="field-row" draggable="true" data-fid="${f.id}" data-idx="${i}">
      <span class="grip material-symbols-outlined">drag_indicator</span>

      <div class="fmeta"><b>${esc(f.label)}${f.required?'<span class="req-star">*</span>':''}</b><div class="ftype">${ft.label}${extra}</div></div>

        <button class="icon-btn" data-edit-field="${f.id}" title="Configure"><span class="material-symbols-outlined">tune</span></button>
        <button class="icon-btn danger" data-del-field="${f.id}" title="Delete"><span class="material-symbols-outlined">delete</span></button>
      </div>
    </div>`;
  }).join(''):`<div class="empty" style="border:2px dashed var(--border-strong);border-radius:var(--radius)">
      <span class="material-symbols-outlined">dashboard_customize</span>

  const palette=`<div class="card palette" style="padding:16px">
    <h4>Add a field</h4>
    ${FIELD_ORDER.map(t=>{const ft=FIELD_TYPES[t];return `<button class="palette-item" data-add-type="${t}">

    ${palette}

function fmtVal(f,v){
  if(v===undefined||v===null||v===''||(Array.isArray(v)&&!v.length))return '<span class="cell-empty">—</span>';
  const ft=FIELD_TYPES[f.type];
  switch(f.type){
    case 'status':{const o=(f.config.options||[]).find(o=>o.id===v);return o?`<span class="status-pill" style="background:${o.color}1f;color:${o.color}"><span class="ds" style="background:${o.color}"></span>${esc(o.label)}</span>`:'<span class="cell-empty">—</span>';}
    case 'category':{const o=(f.config.options||[]).find(o=>o.id===v);return o?`<span class="tag" style="background:${o.color||'#6b7280'}1f;color:${o.color||'#6b7280'}">${esc(o.label)}</span>`:esc(v);}
    case 'user':{const m=memberById(v);return `<span class="chip" style="padding:3px 10px 3px 3px"><span class="avatar" style="background:${m.color}">${initials(m.name)}</span>${esc(m.name)}</span>`;}
    case 'money':return `<b>${esc(f.config.currency||'$')}${Number(v).toLocaleString()}</b>`;
    case 'number':return Number(v).toLocaleString()+(f.config.unit?` <span style="color:var(--text-muted)">${esc(f.config.unit)}</span>`:'');
    case 'email':return `<a href="mailto:${esc(v)}" style="color:var(--info)">${esc(v)}</a>`;
    case 'phone':return esc(v);
    case 'date':return v?new Date(v+'T00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'<span class="cell-empty">—</span>';
    case 'checkbox':return v?`<span class="status-pill" style="background:var(--success-soft);color:var(--success)"><span class="material-symbols-outlined" style="font-size:15px">check</span>Yes</span>`:`<span class="cell-empty">No</span>`;
    case 'file':return `<span class="tag" style="background:var(--surface-3);color:var(--text-muted)"><span class="material-symbols-outlined" style="font-size:14px">description</span>${esc(v)}</span>`;
    case 'relationship':{const ta=curWs().apps.find(x=>x.id===f.config.targetApp);if(!ta)return esc(v);const arr=Array.isArray(v)?v:[v];return arr.map(id=>{const it=ta.items.find(i=>i.id===id);const lbl=it?itemTitle(ta,it):'?';return `<span class="tag" style="background:var(--info-soft);color:var(--info)">${esc(lbl)}</span>`;}).join(' ');}
    case 'calculation':return `<b style="color:${ft.color}">${esc(computeCalc(f,window.__calcCtx||{}))}</b>`;
    case 'textarea':return esc(v).length>60?esc(v.slice(0,60))+'…':esc(v);
    default:return esc(v);
  }
}
function itemTitle(app,item){
  const f=app.fields.find(f=>['text','email'].includes(f.type))||app.fields[0];
  return f?(item.values[f.id]||'Untitled'):'Untitled';
}
function computeCalc(f,values){
  const formula=f.config.formula;if(!formula)return '—';
  const app=curApp();
  let expr=formula.replace(/\{([^}]+)\}/g,(m,name)=>{
    const tf=app.fields.find(x=>x.label.toLowerCase()===name.trim().toLowerCase()&&['number','money','calculation'].includes(x.type));
    const v=tf?Number(values[tf.id]||0):0;return isNaN(v)?0:v;
  });
  if(!/^[-+*/(). 0-9]+$/.test(expr))return '⚠';
  try{const r=Function('"use strict";return('+expr+')')();return isFinite(r)?(Math.round(r*100)/100).toLocaleString():'—';}catch(e){return '⚠';}
}

function viewItems(a){
  if(!a.fields.length)return `<div class="card"><div class="empty"><span class="material-symbols-outlined">dashboard_customize</span>
    <h3>This app has no fields yet</h3><p>Before adding items you need to design the app's structure. Add fields like Text, Status, or Date.</p>

  if(!a.items.length)return `<div class="card"><div class="empty"><span class="material-symbols-outlined">inbox</span>
    <h3>No items yet</h3><p>Add your first record using the form built from your custom fields.</p>
    <button class="btn btn-primary" data-add-item><span class="material-symbols-outlined">add</span> Add item</button></div></div>`;

  return `<div class="tbl-wrap"><table>
    <thead><tr>${cols.map(f=>`<th>${esc(f.label)}</th>`).join('')}<th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>

}

/* ---- REPORTING ---- */
function donutSVG(segs,size=176){
  const total=segs.reduce((s,x)=>s+x.value,0)||1;
  const r=size/2-16,cx=size/2,cy=size/2,C=2*Math.PI*r;let off=0;
  const rings=segs.filter(s=>s.value>0).map(s=>{
    const dash=s.value/total*C;
    const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    off+=dash;return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="20"/>
    ${rings}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="27" font-weight="800" fill="var(--text)">${total}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="10.5" letter-spacing="1" fill="var(--text-muted)" font-weight="700">TOTAL</text>
  </svg>`;
}
function barsHTML(bars,fmt){
  const max=Math.max(...bars.map(b=>b.value),1);
  return `<div class="bars">${bars.map(b=>`<div class="bar-row">
    <div class="bar-label" title="${esc(b.label)}">${esc(b.label)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(b.value/max*100,b.value>0?4:0)}%;background:${b.color}"></div></div>
    <div class="bar-val">${fmt?fmt(b.value):b.value.toLocaleString()}</div></div>`).join('')}</div>`;
}
function groupKey(it,field){let k=it.values[field.id];if(Array.isArray(k))k=k[0];return (k==null||k==='')?'__none':k;}
function keyMeta(field,key){
  if(key==='__none')return{label:'(empty)',color:'#9ca3af'};
  if(field.type==='user'){const m=memberById(key);return{label:m.name,color:m.color};}
  if(field.type==='status'||field.type==='category'){const o=(field.config.options||[]).find(o=>o.id===key);return o?{label:o.label,color:o.color||'#6b7280'}:{label:String(key),color:'#6b7280'};}
  return{label:String(key),color:'#6b7280'};
}
function viewReports(a){
  if(!a.fields.length||!a.items.length)return `<div class="card"><div class="empty"><span class="material-symbols-outlined">monitoring</span>
    <h3>Nothing to report yet</h3><p>Add fields and a few items to this app and charts will appear here automatically.</p>
    <button class="btn btn-primary" data-tab="${a.fields.length?'items':'fields'}"><span class="material-symbols-outlined">add</span> ${a.fields.length?'Add items':'Add fields'}</button></div></div>`;
  const moneyFields=a.fields.filter(f=>f.type==='money');
  const groupField=a.fields.find(f=>f.type==='status')||a.fields.find(f=>f.type==='category')||a.fields.find(f=>f.type==='user');
  let kpis=[{v:a.items.length,l:'Total items',ic:'database',c:'var(--primary)'}];
  moneyFields.slice(0,2).forEach(mf=>{
    const sum=a.items.reduce((s,it)=>s+Number(it.values[mf.id]||0),0);
    kpis.push({v:(mf.config.currency||'$')+sum.toLocaleString(),l:'Σ '+mf.label,ic:'payments',c:'var(--success)'});
  });
  if(groupField&&groupField.type==='status'){
    const opts=groupField.config.options||[];const last=opts[opts.length-1];
    if(last){const n=a.items.filter(it=>it.values[groupField.id]===last.id).length;
      kpis.push({v:n,l:last.label,ic:'flag',c:last.color});}
    const first=opts[0];if(first){const n=a.items.filter(it=>it.values[groupField.id]===first.id).length;
      kpis.push({v:n,l:first.label,ic:'fiber_new',c:first.color});}
  }
  const kpiHTML=`<div class="kpi-grid">${kpis.slice(0,5).map(k=>`<div class="card kpi">
    <div class="ki" style="background:${k.c}"><span class="material-symbols-outlined" style="font-size:19px">${k.ic}</span></div>
    <div class="kv">${esc(String(k.v))}</div><div class="kl">${esc(k.l)}</div></div>`).join('')}</div>`;
  let donutCard='';
  if(groupField){
    const counts={};a.items.forEach(it=>{const k=groupKey(it,groupField);counts[k]=(counts[k]||0)+1;});
    const segs=Object.keys(counts).map(k=>({...keyMeta(groupField,k),value:counts[k]})).sort((x,y)=>y.value-x.value);
    donutCard=`<div class="card chart-card"><h4><span class="material-symbols-outlined">donut_large</span> ${esc(a.items.length)} items by ${esc(groupField.label)}</h4>
      <div class="donut-wrap">${donutSVG(segs)}<div class="legend">${segs.map(s=>`<div class="lg"><span class="sw" style="background:${s.color}"></span>${esc(s.label)}<span class="lv">${s.value}</span></div>`).join('')}</div></div></div>`;
  }
  let barCard='';
  if(groupField){
    const mf=moneyFields[0];const agg={};
    a.items.forEach(it=>{const k=groupKey(it,groupField);agg[k]=(agg[k]||0)+(mf?Number(it.values[mf.id]||0):1);});
    const bars=Object.keys(agg).map(k=>({...keyMeta(groupField,k),value:agg[k]})).sort((x,y)=>y.value-x.value);
    barCard=`<div class="card chart-card"><h4><span class="material-symbols-outlined">bar_chart</span> ${mf?`${esc(mf.label)} by ${esc(groupField.label)}`:`Count by ${esc(groupField.label)}`}</h4>
      ${barsHTML(bars,mf?v=>(mf.config.currency||'$')+v.toLocaleString():null)}</div>`;
  }
  const byDate={};a.items.forEach(it=>{const d=it.createdAt||'—';byDate[d]=(byDate[d]||0)+1;});
  const dates=Object.keys(byDate).sort().slice(-10);const dmax=Math.max(...dates.map(d=>byDate[d]),1);
  const timeCard=`<div class="card chart-card"><h4><span class="material-symbols-outlined">timeline</span> Items added over time</h4>
    <div class="spark">${dates.map(d=>`<div class="sb" style="height:${byDate[d]/dmax*100}%" title="${esc(d)}: ${byDate[d]}"></div>`).join('')}</div>
    <div class="spark-x">${dates.map(d=>`<span>${esc(d.slice(5))}</span>`).join('')}</div></div>`;
  return kpiHTML+`<div class="report-grid">${donutCard}${barCard}${timeCard}</div>`;
}

/* ---- AUTOMATIONS ---- */
function fieldById(a,id){return a.fields.find(f=>f.id===id);}
function valLabel(a,fieldId,val){
  const f=fieldById(a,fieldId);if(!f)return esc(val);
  if(f.type==='status'||f.type==='category'){const o=(f.config.options||[]).find(o=>o.id===val);return o?esc(o.label):esc(val);}
  if(f.type==='user'){return esc(memberById(val).name);}
  return esc(val);
}
function triggerText(a,t){
  if(t.event==='created')return `<span class="rule-pill"><span class="material-symbols-outlined" style="font-size:14px">add_circle</span>Item is created</span>`;
  if(t.event==='updated')return `<span class="rule-pill"><span class="material-symbols-outlined" style="font-size:14px">edit</span>Item is updated</span>`;
  const f=fieldById(a,t.fieldId);
  return `<span class="rule-pill"><span class="material-symbols-outlined" style="font-size:14px">flag</span>${esc(f?f.label:'?')} = ${valLabel(a,t.fieldId,t.value)}</span>`;

function logActivity(ws,entry){ws.activity=ws.activity||[];ws.activity.unshift({id:uid(),ts:new Date().toISOString(),...entry});if(ws.activity.length>60)ws.activity.length=60;}
function timeAgo(ts){const s=(Date.now()-new Date(ts).getTime())/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function runAutomations(app,item,event,prev){
  const ws=curWs();const fired=[];
  (app.automations||[]).forEach(au=>{
    if(!au.enabled)return;const t=au.trigger;let fire=false;
    if(t.event==='created')fire=event==='created';
    else if(t.event==='updated')fire=event==='updated';
    else if(t.event==='field_is'){const now=item.values[t.fieldId];const was=prev?prev[t.fieldId]:undefined;fire=(event==='created'||event==='updated')&&now===t.value&&was!==t.value;}
    if(!fire)return;
    (au.actions||[]).forEach(ac=>{
      if((ac.type==='set_field'||ac.type==='assign')&&ac.fieldId)item.values[ac.fieldId]=ac.value;
      else if(ac.type==='notify')logActivity(ws,{icon:'notifications',color:'#7c3aed',text:esc(ac.message||`Notification from "${au.name}"`)});
    });
    fired.push(au.name);
    logActivity(ws,{icon:'bolt',color:'#7c3aed',text:`⚡ <b>${esc(au.name)}</b> ran on <b>${esc(itemTitle(app,item))}</b>`});
  });
  if(fired.length)setTimeout(()=>toast(`Automation: ${fired.join(', ')}`,'bolt'),350);
  return fired;
}

function renderActionCards(a){

      else if(f&&f.type==='checkbox')valInput=`<select class="select" data-acval="${i}"><option value="true" ${ac.value===true?'selected':''}>Yes</option><option value="false" ${ac.value===false?'selected':''}>No</option></select>`;

      cfg=`<select class="select" data-acfield="${i}">${setable.map(x=>`<option value="${x.id}" ${x.id===fid?'selected':''}>${esc(x.label)}</option>`).join('')}</select>${valInput}`;

    }else{
      cfg=`<input class="input" data-acmsg="${i}" value="${esc(ac.message||'')}" placeholder="Message for the activity feed">`;
    }

      <div class="acgrow">

      <button class="btn btn-primary" id="apCreate"><span class="material-symbols-outlined">add</span> Create app</button></div>
  </div>`);
  $$('#apIcon .emoji-opt').forEach(b=>b.onclick=()=>{$$('#apIcon .emoji-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');appDraft.icon=b.dataset.ic;$('.mh-ic .material-symbols-outlined').textContent=b.dataset.ic;});
  $$('#apColor .swatch').forEach(b=>b.onclick=()=>{$$('#apColor .swatch').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');appDraft.color=b.dataset.c;$('.mh-ic').style.background=b.dataset.c;});
  $('#apCreate').onclick=()=>{
    const name=$('#apName').value.trim();if(!name)return toast('Give your app a name','error');
    const app={id:uid(),name,description:$('#apDesc').value.trim(),type:$('#apType').value,icon:appDraft.icon,color:appDraft.color,fields:[],items:[],automations:[]};
    curWs().apps.push(app);save();closeModal();openApp(app.id);VIEW.appTab='fields';render();toast(`App "${name}" created — now add fields`);
  };
}
function saveAppSettings(){
  const a=curApp();a.name=$('#setName').value.trim()||a.name;a.description=$('#setDesc').value.trim();a.type=$('#setType').value.trim();
  const ic=$('#setIcons .emoji-opt.sel');if(ic)a.icon=ic.dataset.ic;
  const cl=$('#setColors .swatch.sel');if(cl)a.color=cl.dataset.c;
  save();render();toast('App settings saved');
}
function delApp(){
  const a=curApp();confirmModal('Delete app?',`"${a.name}" and its ${a.items.length} item(s) will be removed.`,()=>{
    const w=curWs();w.apps=w.apps.filter(x=>x.id!==a.id);save();openWorkspace(w.id);toast('App deleted','delete');
  });
}
let fieldDraft=null;
function openFieldModal(fieldId,newType){
  const a=curApp();
  const existing=fieldId?a.fields.find(f=>f.id===fieldId):null;
  const type=existing?existing.type:newType;
  const ft=FIELD_TYPES[type];
  fieldDraft=existing?JSON.parse(JSON.stringify(existing)):{id:uid(),type,label:'',required:false,config:{}};
  if((type==='category'||type==='status')&&!fieldDraft.config.options){
    fieldDraft.config.options=type==='status'
      ?[{id:uid(),label:'To Do',color:'#6b7280'},{id:uid(),label:'In Progress',color:'#d97706'},{id:uid(),label:'Done',color:'#15803d'}]
      :[{id:uid(),label:'Option 1',color:'#2563eb'},{id:uid(),label:'Option 2',color:'#7c3aed'}];
  }
  modal(`<div class="modal">
    <div class="modal-head"><div class="mh-ic" style="background:${ft.color}"><span class="material-symbols-outlined">${ft.icon}</span></div>
      <h3>${existing?'Configure':'Add'} ${ft.label} field</h3><button class="close" data-close><span class="material-symbols-outlined">close</span></button></div>
    <div class="modal-body">
      <div class="field"><label>Field label</label><input class="input" id="fLabel" value="${esc(fieldDraft.label)}" placeholder="${esc(ft.label)} field name" autofocus></div>
      <div id="fConfig">${fieldConfigUI(fieldDraft,a)}</div>
      <div class="check-row"><label class="switch"><input type="checkbox" id="fReq" ${fieldDraft.required?'checked':''}><span class="slider"></span></label>
        <div><b style="font-size:.88rem">Required field</b><div class="hint" style="margin:0">Items can't be saved without it.</div></div></div>
    </div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button>
      <button class="btn btn-primary" id="fSave"><span class="material-symbols-outlined">check</span> ${existing?'Save field':'Add field'}</button></div>
  </div>`);
  bindFieldConfig(a);
  $('#fSave').onclick=()=>{
    fieldDraft.label=$('#fLabel').value.trim();if(!fieldDraft.label)return toast('Give the field a label','error');
    fieldDraft.required=$('#fReq').checked;
    collectFieldConfig();
    if(existing){const i=a.fields.findIndex(f=>f.id===fieldId);a.fields[i]=fieldDraft;}
    else a.fields.push(fieldDraft);
    save();closeModal();render();toast(existing?'Field updated':`"${fieldDraft.label}" added`);
  };
}
function fieldConfigUI(fd,app){
  const t=fd.type;
  if(t==='category'||t==='status'){
    return `<div class="field"><label>Options</label>
      <div class="opt-list" id="optList">${(fd.config.options||[]).map(o=>optRow(o,t==='status')).join('')}</div>
      <button class="btn btn-sm" id="addOpt" style="margin-top:9px"><span class="material-symbols-outlined">add</span> Add option</button></div>`;
  }
  if(t==='relationship'){
    return `<div class="field"><label>Linked app</label>
      <select class="select" id="relTarget"><option value="">— Select app to link —</option>
        ${curWs().apps.map(ap=>`<option value="${ap.id}" ${fd.config.targetApp===ap.id?'selected':''}>${esc(ap.name)}</option>`).join('')}</select>
      <div class="hint">Items in this app can reference items from the linked app.</div></div>
      <div class="check-row"><label class="switch"><input type="checkbox" id="relMulti" ${fd.config.multiple?'checked':''}><span class="slider"></span></label>
        <div><b style="font-size:.88rem">Allow multiple links</b></div></div>`;
  }
  if(t==='calculation'){
    const numFields=app.fields.filter(f=>['number','money','calculation'].includes(f.type));
    return `<div class="field"><label>Formula</label>
      <input class="input" id="calcFormula" value="${esc(fd.config.formula||'')}" placeholder="e.g. {Quantity} * {Unit Price}">
      <div class="hint">Reference number/money fields by name in {curly braces}. Operators: + - * / ( )</div>
      ${numFields.length?`<div style="margin-top:9px;display:flex;gap:6px;flex-wrap:wrap">${numFields.map(f=>`<button class="tag" style="background:var(--purple-soft);color:var(--purple);border:none;cursor:pointer" data-insert="{${esc(f.label)}}">${esc(f.label)}</button>`).join('')}</div>`:'<div class="hint" style="color:var(--warning)">Add Number or Money fields first to reference them.</div>'}
    </div>`;
  }
  if(t==='money'){
    return `<div class="field"><label>Currency symbol</label><input class="input" id="curSym" value="${esc(fd.config.currency||'$')}" maxlength="3" style="max-width:120px"></div>`;
  }
  if(t==='number'){
    return `<div class="field"><label>Unit / suffix <span class="opt">(optional)</span></label><input class="input" id="numUnit" value="${esc(fd.config.unit||'')}" placeholder="e.g. sq ft, hrs" style="max-width:200px"></div>`;
  }
  if(t==='text'||t==='textarea'){
    return `<div class="field"><label>Placeholder <span class="opt">(optional)</span></label><input class="input" id="phText" value="${esc(fd.config.placeholder||'')}" placeholder="Hint shown in the input"></div>`;
  }
  return `<div class="hint" style="margin-bottom:4px">No extra configuration needed for this field type.</div>`;
}
function optRow(o,isStatus){
  return `<div class="opt-item" data-oid="${o.id}">
    <input type="color" class="dot-pick" value="${o.color||'#2563eb'}">
    <input class="input opt-label" value="${esc(o.label)}" placeholder="Option label">
    <button class="icon-btn danger del-opt" type="button"><span class="material-symbols-outlined">close</span></button></div>`;
}
function bindFieldConfig(app){
  const addOpt=$('#addOpt');
  if(addOpt)addOpt.onclick=()=>{const list=$('#optList');const wrap=document.createElement('div');wrap.innerHTML=optRow({id:uid(),label:'',color:PALETTE[list.children.length%PALETTE.length]},fieldDraft.type==='status');list.appendChild(wrap.firstElementChild);bindOptDel();};
  bindOptDel();
  const calc=$('#calcFormula');
  if(calc)$$('[data-insert]').forEach(b=>b.onclick=()=>{calc.value+=(calc.value&&!calc.value.endsWith(' ')?' ':'')+b.dataset.insert;calc.focus();});
}
function bindOptDel(){$$('.del-opt').forEach(b=>b.onclick=()=>{if($$('.opt-item').length<=1)return toast('Keep at least one option','error');b.closest('.opt-item').remove();});}
function collectFieldConfig(){
  const t=fieldDraft.type;fieldDraft.config=fieldDraft.config||{};
  if(t==='category'||t==='status'){
    fieldDraft.config.options=$$('.opt-item').map(r=>({id:r.dataset.oid,label:r.querySelector('.opt-label').value.trim()||'Untitled',color:r.querySelector('.dot-pick').value})).filter(o=>o.label);
  }
  if(t==='relationship'){fieldDraft.config.targetApp=$('#relTarget').value;fieldDraft.config.multiple=$('#relMulti').checked;}
  if(t==='calculation')fieldDraft.config.formula=$('#calcFormula').value.trim();
  if(t==='money')fieldDraft.config.currency=$('#curSym').value.trim()||'$';
  if(t==='number')fieldDraft.config.unit=$('#numUnit').value.trim();
  if(t==='text'||t==='textarea')fieldDraft.config.placeholder=$('#phText') ? $('#phText').value.trim():'';
}
function delField(fid){
  const a=curApp();const f=a.fields.find(x=>x.id===fid);
  confirmModal('Delete field?',`"${f.label}" and its data in all ${a.items.length} item(s) will be removed.`,()=>{
    a.fields=a.fields.filter(x=>x.id!==fid);a.items.forEach(it=>delete it.values[fid]);save();render();toast('Field deleted','delete');
  });
}
function openItemModal(itemId){
  const a=curApp();const item=itemId?a.items.find(i=>i.id===itemId):null;
  const vals=item?{...item.values}:{};
  const body=a.fields.map(f=>renderFieldInput(f,vals[f.id])).join('');
  modal(`<div class="modal">
    <div class="modal-head"><div class="mh-ic" style="background:${a.color}"><span class="material-symbols-outlined">${a.icon}</span></div>
      <h3>${item?'Edit':'New'} ${esc(a.name.replace(/s$/,''))}</h3><button class="close" data-close><span class="material-symbols-outlined">close</span></button></div>
    <div class="modal-body" id="itemForm">${body||'<div class="hint">This app has no fields yet.</div>'}</div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button>
      <button class="btn btn-primary" id="itemSave"><span class="material-symbols-outlined">check</span> ${item?'Save':'Add item'}</button></div>
  </div>`);
  bindItemInputs(a);
  $('#itemSave').onclick=()=>{
    const v={};let missing=null;
    a.fields.forEach(f=>{const val=readFieldInput(f);v[f.id]=val;if(f.required&&(val===''||val==null||(Array.isArray(val)&&!val.length)))missing=missing||f.label;});
    if(missing)return toast(`"${missing}" is required`,'error');
    let target;
    if(item){item.values=v;target=item;logActivity(curWs(),{icon:a.icon,color:a.color,text:`Updated <b>${esc(itemTitle(a,item))}</b> in ${esc(a.name)}`});runAutomations(a,item,'updated',vals);}
    else{target={id:uid(),values:v,createdAt:new Date().toISOString().slice(0,10)};a.items.push(target);logActivity(curWs(),{icon:a.icon,color:a.color,text:`Added <b>${esc(itemTitle(a,target))}</b> to ${esc(a.name)}`});runAutomations(a,target,'created',null);}
    save();closeModal();render();toast(item?'Item saved':'Item added');
  };
}
function renderFieldInput(f,val){
  const ft=FIELD_TYPES[f.type];
  const lbl=`<label>${esc(f.label)}${f.required?'<span class="req-star">*</span>':''} <span class="opt" style="text-transform:none">${ft.label}</span></label>`;
  let input='';
  switch(f.type){
    case 'text':input=`<input class="input" data-f="${f.id}" value="${esc(val||'')}" placeholder="${esc(f.config.placeholder||'')}">`;break;
    case 'textarea':input=`<textarea class="input" data-f="${f.id}" placeholder="${esc(f.config.placeholder||'')}">${esc(val||'')}</textarea>`;break;
    case 'email':input=`<input type="email" class="input" data-f="${f.id}" value="${esc(val||'')}" placeholder="name@email.com">`;break;
    case 'phone':input=`<input type="tel" class="input" data-f="${f.id}" value="${esc(val||'')}" placeholder="(555) 000-0000">`;break;
    case 'number':input=`<div style="display:flex;align-items:center;gap:8px"><input type="number" class="input" data-f="${f.id}" value="${esc(val??'')}" style="max-width:200px">${f.config.unit?`<span style="color:var(--text-muted);font-size:.86rem">${esc(f.config.unit)}</span>`:''}</div>`;break;
    case 'money':input=`<div style="display:flex;align-items:center;gap:8px"><span style="color:var(--text-muted);font-weight:700">${esc(f.config.currency||'$')}</span><input type="number" step="0.01" class="input" data-f="${f.id}" value="${esc(val??'')}" style="max-width:220px"></div>`;break;
    case 'date':input=`<input type="date" class="input" data-f="${f.id}" value="${esc(val||'')}" style="max-width:220px">`;break;
    case 'checkbox':input=`<label class="switch"><input type="checkbox" data-f="${f.id}" ${val?'checked':''}><span class="slider"></span></label>`;break;
    case 'category':case 'status':
      input=`<select class="select" data-f="${f.id}"><option value="">— Select —</option>${(f.config.options||[]).map(o=>`<option value="${o.id}" ${val===o.id?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;break;
    case 'user':
      input=`<select class="select" data-f="${f.id}"><option value="">— Unassigned —</option>${curWs().members.map(id=>{const m=memberById(id);return `<option value="${id}" ${val===id?'selected':''}>${esc(m.name)}</option>`;}).join('')}</select>`;
      if(!curWs().members.length)input=`<div class="hint" style="color:var(--warning)">Invite members to the workspace to assign them.</div>`;break;
    case 'relationship':{
      const ta=curWs().apps.find(x=>x.id===f.config.targetApp);
      if(!ta){input=`<div class="hint" style="color:var(--warning)">No linked app configured.</div>`;break;}
      const cur=Array.isArray(val)?val:(val?[val]:[]);
      input=`<select class="select" data-f="${f.id}" ${f.config.multiple?'multiple style="min-height:96px"':''}>${f.config.multiple?'':'<option value="">— None —</option>'}${ta.items.map(it=>`<option value="${it.id}" ${cur.includes(it.id)?'selected':''}>${esc(itemTitle(ta,it))}</option>`).join('')}</select>
        <div class="hint">Linked to <b>${esc(ta.name)}</b>${f.config.multiple?' · hold Ctrl/Cmd to select multiple':''}</div>`;break;}
    case 'file':input=`<input class="input" data-f="${f.id}" value="${esc(val||'')}" placeholder="Document name or URL"><div class="hint">Prototype: stores a filename/link reference.</div>`;break;
    case 'calculation':input=`<div class="input" style="background:var(--surface-2);color:var(--purple);font-weight:700" data-calc="${f.id}">—</div><div class="hint">Auto-calculated: <code>${esc(f.config.formula||'(no formula)')}</code></div>`;break;
    default:input=`<input class="input" data-f="${f.id}" value="${esc(val||'')}">`;
  }
  return `<div class="field">${lbl}${input}</div>`;
}
function bindItemInputs(a){
  const recompute=()=>{
    const vals={};a.fields.forEach(f=>{if(f.type!=='calculation')vals[f.id]=readFieldInput(f);});
    a.fields.filter(f=>f.type==='calculation').forEach(f=>{const el=$(`[data-calc="${f.id}"]`);if(el)el.textContent=computeCalc(f,vals);});
  };
  $$('#itemForm [data-f]').forEach(el=>el.addEventListener('input',recompute));
  recompute();
}
function readFieldInput(f){
  const el=$(`[data-f="${f.id}"]`);if(!el)return f.type==='calculation'?undefined:'';
  if(f.type==='checkbox')return el.checked;
  if(f.type==='number'||f.type==='money')return el.value===''?'':Number(el.value);
  if(f.type==='relationship'&&f.config.multiple)return [...el.selectedOptions].map(o=>o.value);
  return el.value;
}
function delItem(id){
  const a=curApp();confirmModal('Delete item?','This record will be permanently removed.',()=>{
    a.items=a.items.filter(x=>x.id!==id);save();render();toast('Item deleted','delete');
  });
}
function confirmModal(title,msg,onYes){
  modal(`<div class="modal" style="max-width:420px">
    <div class="modal-head"><div class="mh-ic" style="background:var(--danger)"><span class="material-symbols-outlined">warning</span></div>
      <h3>${esc(title)}</h3></div>
    <div class="modal-body"><p style="color:var(--text-muted)">${esc(msg)}</p></div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button>
      <button class="btn btn-primary" style="background:var(--danger);border-color:var(--danger)" id="cfYes">Delete</button></div>
  </div>`);
  $('#cfYes').onclick=()=>{closeModal();onYes();};
}

/* ==================================================================
   wiring
   ================================================================== */
$('#quickNew').onclick=()=>openWsModal();
$('#themeToggle').onclick=e=>{e.stopPropagation();setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');};
$('#userCard').onclick=()=>toast('Account menu — demo');
$('#companyCard').onclick=()=>toast('Company switcher — demo');
$('#menuBtn').onclick=()=>{$('#deck').classList.add('open');$('#scrimM').classList.add('show');};
$('#scrimM').onclick=closeSidebar;
function closeSidebar(){$('#deck').classList.remove('open');$('#scrimM').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeSidebar();}});

render();
</script>
</body>
</html>
